<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pretext Demo — Input Box</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        color-scheme: light;
        --page: #f4f1ea;
        --panel: #fffdf8;
        --ink: #1f1a17;
        --muted: #6b625b;
        --rule: #d8cec3;
        --accent: #b3582a;
        --accent-soft: #f2e5dc;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at top, #fff8f1 0, var(--page) 42%, #efe8de 100%);
        color: var(--ink);
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      .page {
        width: min(820px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .intro {
        margin-bottom: 18px;
      }

      .eyebrow {
        margin: 0 0 8px;
        font: 12px/1.2 "SF Mono", ui-monospace, monospace;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font: 700 28px/1.1 Georgia, "Times New Roman", serif;
      }

      .intro p {
        margin: 10px 0 0;
        max-width: 56ch;
        line-height: 1.45;
        color: var(--muted);
      }

      .panel {
        padding: 18px;
        border: 1px solid var(--rule);
        border-radius: 20px;
        background: color-mix(in srgb, var(--panel) 92%, white 8%);
        box-shadow: 0 18px 40px rgb(54 40 23 / 0.08);
      }

      .panel + .panel {
        margin-top: 16px;
      }

      .label {
        display: block;
        margin: 0 0 10px;
        font: 12px/1.2 "SF Mono", ui-monospace, monospace;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--muted);
      }

      textarea {
        width: 100%;
        min-height: 88px;
        padding: 16px 18px;
        border: 1px solid #c8b8aa;
        border-radius: 16px;
        background: white;
        color: var(--ink);
        font: 16px/24px "Helvetica Neue", Helvetica, Arial, sans-serif;
        resize: none;
        overflow: hidden;
        white-space: normal;
        overflow-wrap: break-word;
        word-break: normal;
        line-break: auto;
      }

      textarea:focus {
        outline: 2px solid color-mix(in srgb, var(--accent) 40%, white 60%);
        outline-offset: 2px;
      }

      .meta {
        margin: 0;
        font: 13px/1.45 "SF Mono", ui-monospace, monospace;
        color: var(--muted);
        white-space: pre-wrap;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      h2 {
        margin: 0 0 12px;
        font: 600 15px/1.2 "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      ol {
        margin: 0;
        padding-left: 22px;
      }

      li + li {
        margin-top: 10px;
      }

      .row-meta {
        display: block;
        margin-bottom: 3px;
        font: 12px/1.3 "SF Mono", ui-monospace, monospace;
        color: var(--accent);
      }

      code {
        font: 12px/1.45 "SF Mono", ui-monospace, monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 740px) {
        .page {
          width: min(100vw - 20px, 820px);
          padding-top: 20px;
        }

        .panel {
          padding: 14px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="intro">
        <p class="eyebrow">Demo</p>
        <h1>Auto-sizing multi-line input</h1>
        <p>
          This textarea sizes itself from Pretext. Edit the text, resize the page,
          and inspect the line boundaries and preprocessing segments below.
        </p>
      </section>

      <section class="panel">
        <label class="label" for="editor">Editable text</label>
        <textarea id="editor" spellcheck="false"></textarea>
      </section>

      <section class="panel">
        <p id="summary" class="meta">loading…</p>
      </section>

      <section class="grid">
        <section class="panel">
          <h2>Pretext lines</h2>
          <ol id="lines"></ol>
        </section>

        <section class="panel">
          <h2>Segments</h2>
          <ol id="segments"></ol>
        </section>
      </section>
    </main>

    <script type="module" src="./input-box.ts"></script>
  </body>
</html>
